name: CI/CD - Food Store

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy
      
      - name: Run flake8
        working-directory: backend
        run: flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run black
        working-directory: backend
        run: black --check app
      
      - name: Run isort
        working-directory: backend
        run: isort --check-only app

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: foodstore_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: food_store_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      
      - name: Create .env file
        working-directory: backend
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://foodstore_test:test_password@localhost:5432/food_store_test" > .env
          echo "DATABASE_URL_SYNC=postgresql://foodstore_test:test_password@localhost:5432/food_store_test" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "REFRESH_TOKEN_EXPIRE_DAYS=7" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "MP_ACCESS_TOKEN=test_mp_token" >> .env
          echo "MP_WEBHOOK_SECRET=test_webhook_secret" >> .env
      
      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head
      
      - name: Run pytest with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=60
        env:
          DATABASE_URL: postgresql+asyncpg://foodstore_test:test_password@localhost:5432/food_store_test
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage.xml

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
      
      - name: Display coverage summary
        run: |
          echo "Coverage report available in artifacts"
          echo "Minimum required: 60%"